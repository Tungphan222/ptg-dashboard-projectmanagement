name: Sync Notion Data

on:
  # Tự động chạy mỗi 2 tiếng
  schedule:
    - cron: '0 */2 * * *'

  # Cho phép chạy thủ công từ GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/fetch-notion.js

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Chỉ commit nếu có thay đổi
          git diff --staged --quiet || git commit -m "chore: sync notion data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
